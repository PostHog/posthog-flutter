name: Setup
description: Setup Flutter, Node.js, and install dependencies

inputs:
  install:
    description: 'Whether to install dependencies'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup Flutter
      # axi92/flutter-action is a fork of subosito/flutter-action that SHA-pins its internal
      # actions/cache calls; subosito itself uses tag refs which conflicts with our org-wide
      # "Require actions to be pinned to a full-length commit SHA" policy. Tracks upstream.
      uses: axi92/flutter-action@36d2c2625bac6ea011cd7808d2a01bd8a7e5c766 # feature/pin-action-sha @ 2026-04-30
      with:
        channel: 'stable'

    - name: Setup pnpm and Node.js
      uses: pnpm/setup@f7d0e5f4b1b3089d2799ef9722859e7ba314c4c8 # v1
      with:
        # TODO: pnpm/setup does not read .nvmrc yet. Keep this in sync with .nvmrc
        # until https://github.com/jasongin/nvs/pull/315 lands.
        runtime: node@24
        cache: true
        install: false

    - name: Install Flutter dependencies
      if: inputs.install == 'true'
      run: flutter pub get
      shell: bash

    - name: Install Node.js dependencies
      if: inputs.install == 'true'
      run: pnpm install --frozen-lockfile
      shell: bash
