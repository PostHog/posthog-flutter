name: "CodeQL Advanced"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
            runner: ubuntu-latest
          - language: swift
            build-mode: manual
            runner: macos-15-xlarge
          - language: actions
            build-mode: none
            runner: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flutter (Swift)
        if: matrix.language == 'swift'
        # axi92/flutter-action is a fork of subosito/flutter-action that SHA-pins its internal
        # actions/cache calls; subosito itself uses tag refs which conflicts with our org-wide
        # "Require actions to be pinned to a full-length commit SHA" policy. Tracks upstream.
        uses: axi92/flutter-action@36d2c2625bac6ea011cd7808d2a01bd8a7e5c766 # feature/pin-action-sha @ 2026-04-30
        with:
          channel: 'stable'

      - name: Setup Xcode (Swift)
        if: matrix.language == 'swift'
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: '16.4'

      - name: Install dependencies (Swift)
        if: matrix.language == 'swift'
        run: flutter pub get

      - name: Setup Java (Java/Kotlin)
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Flutter (Java/Kotlin)
        if: matrix.language == 'java-kotlin'
        # axi92/flutter-action is a fork of subosito/flutter-action that SHA-pins its internal
        # actions/cache calls; subosito itself uses tag refs which conflicts with our org-wide
        # "Require actions to be pinned to a full-length commit SHA" policy. Tracks upstream.
        uses: axi92/flutter-action@36d2c2625bac6ea011cd7808d2a01bd8a7e5c766 # feature/pin-action-sha @ 2026-04-30
        with:
          channel: 'stable'

      - name: Install dependencies (Java/Kotlin)
        if: matrix.language == 'java-kotlin'
        run: flutter pub get

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Build Android (Java/Kotlin)
        if: matrix.language == 'java-kotlin'
        working-directory: ./example
        run: flutter build apk

      - name: Build iOS (Swift)
        if: matrix.language == 'swift'
        working-directory: ./example
        run: |
          flutter build ios --simulator --no-codesign --config-only
          cd ios
          pod install
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: '/language:${{matrix.language}}'
