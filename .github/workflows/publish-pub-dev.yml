name: 'Publish to pub.dev'

permissions:
  contents: write

# pub.dev trusted publishing requires releases to run from GitHub tags.
# Keep this tag-triggered workflow separate from the main release workflow; the
# release workflow creates these tags from main after applying changesets.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # Required for authentication using OIDC
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.ref }}

      - name: Validate tag matches version bump
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"

          # Check that the tagged commit is a version bump commit from the release workflow
          COMMIT_MSG=$(git log -1 --pretty=%s)
          EXPECTED_MSG="chore: release ${TAG_VERSION} [version bump]"
          if [ "$COMMIT_MSG" != "$EXPECTED_MSG" ]; then
            echo "❌ Tag '${TAG_VERSION}' does not point to a version bump commit."
            echo "   Expected commit message: '${EXPECTED_MSG}'"
            echo "   Actual commit message:   '${COMMIT_MSG}'"
            echo ""
            echo "This workflow should only be triggered by tags created by the Release workflow."
            exit 1
          fi

          # Check that the tag version matches the version in pubspec.yaml
          PUBSPEC_VERSION=$(grep '^version:' posthog_flutter/pubspec.yaml | sed 's/version: //')
          if [ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]; then
            echo "❌ Tag version '${TAG_VERSION}' does not match pubspec.yaml version '${PUBSPEC_VERSION}'."
            exit 1
          fi

          echo "✓ Tag '${TAG_VERSION}' is valid: commit message and pubspec.yaml version match."

      - name: Setup Dart
        uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2

      - name: Setup Flutter
        # axi92/flutter-action is a fork of subosito/flutter-action that SHA-pins its internal
        # actions/cache calls; subosito itself uses tag refs which conflicts with our org-wide
        # "Require actions to be pinned to a full-length commit SHA" policy. Tracks upstream.
        uses: axi92/flutter-action@36d2c2625bac6ea011cd7808d2a01bd8a7e5c766 # feature/pin-action-sha @ 2026-04-30
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Get version from tag
        id: get-version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Publish to pub.dev
        working-directory: ./posthog_flutter
        run: flutter pub publish --force

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.get-version.outputs.version }}
        run: |
          # Read from the first until the second header in the changelog file
          LAST_CHANGELOG_ENTRY=$(awk -v defText="see CHANGELOG.md" '/^## Next$/{next} /^## /{if (flag) exit; flag=1; next} flag; END{if (!flag) print defText}' posthog_flutter/CHANGELOG.md)
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/releases \
            -f tag_name="$RELEASE_VERSION" \
            -f target_commitish='main' \
            -f name="$RELEASE_VERSION" \
            -f body="$LAST_CHANGELOG_ENTRY" \
            -F draft=false \
            -F prerelease=false \
            -F generate_release_notes=false

      # Notify in case of failure
      - name: Send failure event to PostHog
        if: ${{ failure() }}
        uses: PostHog/posthog-github-action@58dea254b598fb5d469c0699c98af8288a7f7650 # v1.2.0
        with:
          posthog-token: '${{ secrets.POSTHOG_PROJECT_API_KEY }}'
          event: 'posthog-flutter-release-workflow-failure'
          properties: >-
            {
              "commitSha": "${{ github.sha }}",
              "jobStatus": "${{ job.status }}",
              "ref": "${{ github.ref }}",
              "packageVersion": "${{ steps.get-version.outputs.version }}"
            }

      - name: Restore Slack thread_ts from cache
        if: ${{ failure() }}
        id: restore-thread-ts-for-failure
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .slack-thread-ts
          key: slack-thread-ts-${{ steps.get-version.outputs.version }}

      - name: Read Slack thread_ts for failure
        if: ${{ failure() }}
        id: slack-thread-for-failure
        run: |
          if [ -f .slack-thread-ts ]; then
            THREAD_TS=$(cat .slack-thread-ts)
            echo "thread_ts=$THREAD_TS" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack - Failed
        continue-on-error: true
        if: ${{ failure() && steps.slack-thread-for-failure.outputs.thread_ts != '' }}
        uses: PostHog/.github/.github/actions/slack-thread-reply@5fc4680761e8ac29a61b212756230eba0e276d8c
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ steps.slack-thread-for-failure.outputs.thread_ts }}
          message: '❌ Failed to publish `posthog_flutter@${{ steps.get-version.outputs.version }}` to pub.dev! <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>'
          emoji_reaction: 'x'

  notify-released:
    name: Notify Slack - Released
    needs: publish
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Get version from tag
        id: get-version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore Slack thread_ts from cache
        id: restore-thread-ts
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .slack-thread-ts
          key: slack-thread-ts-${{ steps.get-version.outputs.version }}

      - name: Read Slack thread_ts
        id: slack-thread
        run: |
          if [ -f .slack-thread-ts ]; then
            THREAD_TS=$(cat .slack-thread-ts)
            echo "thread_ts=$THREAD_TS" >> "$GITHUB_OUTPUT"
            echo "✓ Found thread_ts: $THREAD_TS"
          else
            echo "⚠ No thread_ts found, will post as a new message"
            echo "thread_ts=" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack - Released
        if: needs.publish.result == 'success'
        continue-on-error: true
        uses: PostHog/.github/.github/actions/slack-thread-reply@5fc4680761e8ac29a61b212756230eba0e276d8c
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ steps.slack-thread.outputs.thread_ts }}
          message: '🚀 `posthog_flutter@${{ steps.get-version.outputs.version }}` released successfully!'
          emoji_reaction: "rocket"

      - name: Notify Slack - Failed
        if: needs.publish.result == 'failure'
        continue-on-error: true
        uses: PostHog/.github/.github/actions/slack-thread-reply@5fc4680761e8ac29a61b212756230eba0e276d8c
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ steps.slack-thread.outputs.thread_ts }}
          message: '❌ Failed to publish `posthog_flutter@${{ steps.get-version.outputs.version }}` to pub.dev! <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>'
